<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Basic styles for the quiz elements */
        #progressBar {
            width: 100%;
            background: #e0e0e0;
        }
        #progressBar div {
            height: 20px;
            background: #76c7c0;
        }
    </style>
</head>
<body>
    <h1>New Testament Quiz</h1>
    <div id="timer">Time Left: <span id="time">60</span> seconds</div>
    <div id="progressBar"><div style="width: 0%"></div></div>
    <div id="quiz"></div>
    <button id="submit">Submit</button>
    <div id="feedback"></div>
    
    <script>
        const questions = [
            {question: 'Who is the first book of the New Testament?', options: ['Matthew', 'Mark', 'Luke', 'John'], answer: 0}, // Matthew
            {question: 'Who baptized Jesus?', options: ['Peter', 'John the Baptist', 'James', 'Paul'], answer: 1}, // John the Baptist
            {question: 'Where was Jesus born?', options: ['Nazareth', 'Bethlehem', 'Jerusalem', 'Capernaum'], answer: 1}, // Bethlehem
            {question: 'Who denied Jesus three times before the rooster crowed?', options: ['John', 'Judas', 'Peter', 'James'], answer: 2}, // Peter
            {question: 'What is the shortest verse in the Bible?', options: ['God is love', 'Pray without ceasing', 'Jesus wept', 'Rejoice always'], answer: 2}, // Jesus wept
            {question: 'Who wrote most of the New Testament letters?', options: ['Paul', 'Peter', 'James', 'John'], answer: 0}, // Paul
            {question: 'Which disciple was a tax collector?', options: ['Andrew', 'Matthew', 'Simon', 'Philip'], answer: 1}, // Matthew
            {question: 'On what sea did Jesus walk?', options: ['Red Sea', 'Sea of Galilee', 'Dead Sea', 'Mediterranean Sea'], answer: 1}, // Sea of Galilee
            {question: 'Who was thrown into the lions’ den?', options: ['Daniel', 'David', 'Elijah', 'Moses'], answer: 0}, // Daniel
            {question: 'Which apostle is known as “the beloved disciple”?', options: ['James', 'John', 'Peter', 'Andrew'], answer: 1}, // John
            {question: 'How many days did Jesus fast in the wilderness?', options: ['30', '40', '50', '20'], answer: 1}, // 40
            {question: 'Who is the mother of Jesus?', options: ['Elizabeth', 'Anna', 'Mary', 'Martha'], answer: 2} // Mary
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 60;

        function loadQuestion() {
            const questionContainer = document.getElementById('quiz');
            if (currentQuestionIndex < questions.length) {
                const question = questions[currentQuestionIndex];
                questionContainer.innerHTML = `<h2>${question.question}</h2>`;
                question.options.forEach((option, index) => {
                    questionContainer.innerHTML += `<button onclick="checkAnswer(${index})">${option}</button>`;
                });
                updateProgressBar();
            } else {
                endQuiz();
            }
        }

        function checkAnswer(selectedIndex) {
            const question = questions[currentQuestionIndex];
            if (selectedIndex === question.answer) {
                score++;
                document.getElementById('feedback').innerText = 'Correct!';
            } else {
                document.getElementById('feedback').innerText = 'Wrong!';
            }
            currentQuestionIndex++;
            loadQuestion();
        }

        function updateProgressBar() {
            const progressBar = document.querySelector('#progressBar div');
            progressBar.style.width = (currentQuestionIndex / questions.length * 100) + '%';
        }

        function endQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz').innerHTML = `<h2>Your score: ${score} / ${questions.length}</h2>`;
        }

        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endQuiz();
            }
        }, 1000);

        loadQuestion();
    </script>
</body>
</html>
